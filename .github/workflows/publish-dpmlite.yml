name: Publish DPM Lite Package

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write  # Required for creating version tags
      id-token: write # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
      - uses: actions/checkout@v6

      - name: Install UV
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync

      - name: Set CalVer version
        run: |
          git fetch --tags
          DATE=$(date +'%Y.%-m.%-d')
          LATEST=$(git tag -l "dpmlite/v${DATE}.*" | sort -t. -k4 -n | tail -1)
          if [ -z "$LATEST" ]; then
            VERSION="${DATE}.1"
          else
            LAST_NUM=${LATEST##*.}
            VERSION="${DATE}.$((LAST_NUM + 1))"
          fi
          git tag "dpmlite/v${VERSION}"
          git push origin "dpmlite/v${VERSION}"
          uv version $VERSION --package dpmlite
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # ---- Build dpmlite database from dpm2 ----
      - name: Build dpmlite database from dpm2
        run: |
          uv run python projects/dpmlite/build_db.py projects/dpmlite/src/dpmlite/dpm.sqlite

      # ---- Package and publish ----
      - name: Build dpmlite package
        run: uv build
        working-directory: projects/dpmlite

      - name: Publish dpmlite to PyPI
        run: uv publish
