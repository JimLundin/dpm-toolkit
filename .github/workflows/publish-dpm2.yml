name: Publish DPM2 Package

on:
  workflow_dispatch:

jobs:
  build-database:
    uses: ./.github/workflows/build-database.yml
    with:
      version_id: "release"
      include_analyze: false
      include_compare: false

  publish:
    needs: build-database
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write  # Required for creating version tags
      id-token: write # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
      - uses: actions/checkout@v6

      - name: Install UV
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync

      - name: Set CalVer version
        run: |
          git fetch --tags
          DATE=$(date +'%Y.%-m.%-d')
          LATEST=$(git tag -l "dpm2/v${DATE}.*" | sort -t. -k4 -n | tail -1)
          if [ -z "$LATEST" ]; then
            VERSION="${DATE}.1"
          else
            LAST_NUM=${LATEST##*.}
            VERSION="${DATE}.$((LAST_NUM + 1))"
          fi
          git tag "dpm2/v${VERSION}"
          git push origin "dpm2/v${VERSION}"
          uv version $VERSION --package dpm2
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download SQLite database
        uses: actions/download-artifact@v7
        with:
          name: ${{ needs.build-database.outputs.database_artifact_name }}
          path: database/

      - name: Download generated schema
        uses: actions/download-artifact@v7
        with:
          name: ${{ needs.build-database.outputs.schema_artifact_name }}
          path: schema/

      - name: Package database and schema for dpm2
        run: |
          mkdir -p projects/dpm2/src/dpm2
          echo "Packaging artifacts for dpm2..."
          # Copy SQLite database with correct name
          find database -name "*.sqlite" -exec cp {} projects/dpm2/src/dpm2/dpm.sqlite \;
          # Copy generated schema as models.py
          find schema -name "*.py" -exec cp {} projects/dpm2/src/dpm2/models.py \;
          echo "Final dpm2 package contents:"
          ls -la projects/dpm2/src/dpm2/

      - name: Build dpm2 package
        run: uv build
        working-directory: projects/dpm2

      - name: Publish dpm2 to PyPI
        run: uv publish

      - name: Commit generated models.py to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage only the generated models file
          cp projects/dpm2/src/dpm2/models.py projects/dpm2/src/dpm2/models.py
          git add projects/dpm2/src/dpm2/models.py
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "Update dpm2 models.py from ${{ env.VERSION }}"
          git push origin HEAD
