name: Publish DPM2 Package

on:
  workflow_dispatch:

jobs:
  build-database:
    uses: ./.github/workflows/build-database.yml
    with:
      version_id: "release"
      include_analyze: false
      include_compare: false
      include_build_dpm2: false

  version:
    needs: build-database
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating version tags
    outputs:
      version: ${{ steps.calver.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Set CalVer version
        id: calver
        run: |
          git fetch --tags
          DATE=$(date +'%Y.%-m.%-d')
          LATEST=$(git tag -l "dpm2/v${DATE}.*" | sort -t. -k4 -n | tail -1)
          if [ -z "$LATEST" ]; then
            VERSION="${DATE}.1"
          else
            LAST_NUM=${LATEST##*.}
            VERSION="${DATE}.$((LAST_NUM + 1))"
          fi
          git tag "dpm2/v${VERSION}"
          git push origin "dpm2/v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build-versioned:
    needs: [build-database, version]
    uses: ./.github/workflows/build-dpm2.yml
    with:
      sqlite_artifact_name: ${{ needs.build-database.outputs.database_artifact_name }}
      schema_artifact_name: ${{ needs.build-database.outputs.schema_artifact_name }}
      version: ${{ needs.version.outputs.version }}

  publish:
    needs: build-versioned
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    steps:
      - uses: actions/checkout@v6

      - name: Install UV
        uses: astral-sh/setup-uv@v7

      - name: Download versioned dpm2 wheel
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-versioned.outputs.wheel_artifact_name }}
          path: dist/

      - name: Publish dpm2 to PyPI
        run: uv publish dist/*.whl
