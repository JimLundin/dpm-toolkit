name: Generate Schema

on:
  workflow_call:
    inputs:
      sqlite_artifact_name:
        description: "The name of the artifact containing the SQLite database."
        required: true
        type: string
    outputs:
      artifact_name:
        description: "The name of the uploaded artifact containing the generated schema"
        value: ${{ inputs.sqlite_artifact_name }}-schema

jobs:
  schema:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install UV
        uses: astral-sh/setup-uv@v7

      - name: Install python
        run: uv python install

      - name: Install project
        run: uv sync --extra schema --dev

      - name: Download SQLite database artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.sqlite_artifact_name }}

      - name: Generate SQLAlchemy schema
        run: |
          SQLITE_FILE=$(find . -name "*.sqlite" -type f | head -1)
          uv run dpm-toolkit schema "$SQLITE_FILE" > ${{ inputs.sqlite_artifact_name }}.py

      - name: Format generated models with ruff
        run: |
          uv run ruff format *.py
          uv run ruff check *.py --fix-only
          uv run ruff format *.py

      - name: Type check generated models using mypy
        run: |
          uv run mypy *.py

      - name: Type check generated models using ty (ignore errors)
        continue-on-error: true
        run: |
          uv run ty check *.py --exit-zero

      - name: Stage generated schema for testing
        run: |
          SQLITE_FILE=$(find . -name "*.sqlite" -type f | head -1)
          cp "${{ inputs.sqlite_artifact_name }}.py" projects/dpm2/src/dpm2/models.py
          cp "$SQLITE_FILE" projects/dpm2/src/dpm2/dpm.sqlite
          find projects/dpm2 -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Test generated schema against database
        run: |
          uv run --no-sync python -c "import dpm2; print('dpm2 OK')" || echo "IMPORT FAILED: $?"
          uv run --no-sync python -c "from dpm2.models import DPM; print(f'DPM OK, tables={len(DPM.metadata.tables)}')" || echo "MODEL IMPORT FAILED: $?"
          uv run --no-sync python -m pytest projects/dpm2/tests/ -v --tb=short || echo "PYTEST FAILED: $?"
          uv run --no-sync pytest projects/dpm2/tests/ -v --tb=short

      - name: Generate HTML diagram
        run: |
          SQLITE_FILE=$(find . -name "*.sqlite" -type f | head -1)
          uv run dpm-toolkit schema "$SQLITE_FILE" --fmt html > ${{ inputs.sqlite_artifact_name }}-diagram.html

      - name: Validate HTML diagram is well-formed
        run: |
          # Install and use htmlhint for HTML validation
          npm install -g htmlhint
          htmlhint ${{ inputs.sqlite_artifact_name }}-diagram.html
          echo "✅ HTML diagram is well-formed"

      - name: Upload schema artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.sqlite_artifact_name }}-schema
          path: |
            *.py
            *-diagram.html
