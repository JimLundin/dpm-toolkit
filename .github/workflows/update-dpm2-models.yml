name: Update DPM2 Models

on:
  push:
    branches-ignore: [main]
  workflow_dispatch:

jobs:
  build-database:
    uses: ./.github/workflows/build-database.yml
    with:
      version_id: "release"
      include_analyze: false
      include_compare: false

  update-models:
    needs: build-database
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install UV
        uses: astral-sh/setup-uv@v7

      - name: Install python
        run: uv python install

      - name: Download generated schema
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-database.outputs.schema_artifact_name }}
          path: schema/

      - name: Update models.py
        run: |
          find schema -name "*.py" -exec cp {} projects/dpm2/src/dpm2/models.py \;
          echo "Updated models.py:"
          wc -l projects/dpm2/src/dpm2/models.py

      - name: Re-format models.py with dpm2's ruff config
        # The schema workflow formatted the file at the workspace root, where
        # ruff doesn't know ``dpm2`` is first-party. Re-running ruff from
        # within ``projects/dpm2`` picks up the project's own isort
        # classification so ``from dpm2.types import ...`` lands in the
        # first-party group, matching what ``project-qa`` expects.
        working-directory: projects/dpm2
        run: |
          uvx ruff format src/dpm2/models.py
          uvx ruff check src/dpm2/models.py --fix-only --select I
          uvx ruff format src/dpm2/models.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/dpm2/src/dpm2/models.py
          git diff --cached --quiet || git commit -m "Update dpm2 models.py"
          git push origin HEAD
