name: Publish DPM Toolkit CLI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write  # Required for creating version tags
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
      - uses: actions/checkout@v6

      - name: Install UV
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Set CalVer version
        run: |
          git fetch --tags
          DATE=$(date +'%Y.%-m.%-d')
          LATEST=$(git tag -l "dpm-toolkit/v${DATE}.*" | sort -t. -k4 -n | tail -1)
          if [ -z "$LATEST" ]; then
            VERSION="${DATE}.1"
          else
            LAST_NUM=${LATEST##*.}
            VERSION="${DATE}.$((LAST_NUM + 1))"
          fi
          git tag "dpm-toolkit/v${VERSION}"
          git push origin "dpm-toolkit/v${VERSION}"
          uv version $VERSION
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
