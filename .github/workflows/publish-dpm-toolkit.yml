name: Publish DPM Toolkit CLI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
      - uses: actions/checkout@v6

      - name: Install UV
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Set CalVer version
        run: |
          DATE=$(date +'%Y.%-m.%-d')
          LATEST=$(curl -sf https://pypi.org/pypi/dpm-toolkit/json \
            | jq -r --arg date "$DATE" '.releases | keys[] | select(startswith($date + "."))' \
            | sort -t. -k4 -n | tail -1)
          if [ -z "$LATEST" ]; then
            VERSION="${DATE}.1"
          else
            LAST_NUM=${LATEST##*.}
            VERSION="${DATE}.$((LAST_NUM + 1))"
          fi
          uv version $VERSION
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Sync dependencies
        run: uv sync

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
